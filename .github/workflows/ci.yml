name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  audit-and-install:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tap this repo
        run: brew tap vectordbz/vectordbz "$(pwd)"

      - name: Audit cask
        run: brew audit --cask vectordbz

      - name: Install cask
        run: brew install --cask vectordbz

      - name: Verify app exists
        run: test -d "/Applications/VectorDBZ.app" && echo "App installed successfully" || (echo "App not found" && exit 1)

      - name: Uninstall cask
        if: always()
        run: brew uninstall --cask vectordbz || true
